name: Security Testing Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  security-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Security Tests
      run: npx jest tests/security/Security.test.js --testMatch="**/tests/security/**/*.test.js" --json --outputFile=security-results.json
      
    - name: Generate Security Excel Report
      if: always()
      run: node tests/utils/generateSecurityExcel.cjs

    - name: Upload Security Test Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Security_Vulnerability_Report
        path: Security_Vulnerability_Report.xlsx

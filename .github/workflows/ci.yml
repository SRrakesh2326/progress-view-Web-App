name: ProgressView CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Jest Unit Tests
      run: npm run test:unit -- --json --outputFile=jest-results.json
      
    - name: Generate Jest Excel Report
      if: always()
      run: node tests/utils/generateJestExcel.cjs

    - name: Wait for Vite dev server
      run: |
        npm run dev &
        for i in {1..30}; do
          if curl -f http://localhost:5175 > /dev/null 2>&1; then
            echo "Dev server is ready"
            break
          fi
          echo "Waiting for dev server... ($i/30)"
          sleep 1
        done

    - name: Run WebdriverIO E2E Tests
      run: npm run test:web
      env:
        CI: true

    - name: Upload Test Report Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Testing_Execution_Reports
        path: |
          Automation_Execution_Report.xlsx
          Jest_Test_Report.xlsx
